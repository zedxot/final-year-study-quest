<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics 4th Year - Exam Routine</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <div class="top-nav-buttons">
                <a href="quest_board/index.html" class="suggestions-btn" style="background: rgba(234, 179, 8, 0.1); border-color: rgba(234, 179, 8, 0.3); color: #fde047;">
                    <i class="fa-solid fa-gamepad" style="margin-right: 6px;"></i>
                    Daily Quests
                </a>
                <a href="suggestions_viewer/index.html" class="suggestions-btn">
                    <svg style="width: 18px; height: 18px; margin-right: 6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    View Suggestions
                </a>
            </div>
            <h1>B.Sc Honours 4th Year Exam</h1>
            <h2 class="subtitle">Physics Department</h2>
        </header>
        
        <section class="upcoming-exam">
            <h3>Next Exam In</h3>
            <div id="countdown" class="main-countdown">
                <div class="time-box"><span id="days">00</span><small>Days</small></div>
                <div class="time-box"><span id="hours">00</span><small>Hours</small></div>
                <div class="time-box"><span id="minutes">00</span><small>Mins</small></div>
                <div class="time-box"><span id="seconds">00</span><small>Secs</small></div>
            </div>
            <div id="next-exam-details" class="next-exam-details">
                <span class="exam-code" id="next-code">--</span>
                <span class="exam-name" id="next-name">Loading...</span>
            </div>
        </section>

        <section class="routine-grid" id="routine-grid">
            <!-- Dynamic Exam Cards Go Here -->
        </section>
    </div>

    <script src="exams.js"></script>
    <script src="script.js"></script>
</body>
</html>
